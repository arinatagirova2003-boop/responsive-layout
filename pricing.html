<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <!-- Обов'язковий метатег для адаптивної верстки -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Тарифи — Pricing</title>
  <link rel="stylesheet" href="pricing.css">
</head>
<body>
  <section class="pricing">
    <h1 class="pricing-title">Оберіть свій тариф</h1>

    <div class="pricing-grid">
      <!-- Картка 1: Базовий -->
      <article class="pricing-card">
        <h2 class="card-name">Базовий</h2>
        <p class="card-price">₴500<span>/міс</span></p>
        <ul class="card-features">
          <li>1 Користувач</li>
          <li>5 ГБ Пам'яті</li>
          <li>Базова підтримка</li>
        </ul>
        <button class="cta-button">Обрати</button>
      </article>

      <!-- Картка 2: Професійний (популярний) -->
      <article class="pricing-card popular">
        <span class="badge">Популярний</span>
        <h2 class="card-name">Професійний</h2>
        <p class="card-price">₴1200<span>/міс</span></p>
        <ul class="card-features">
          <li>5 Користувачів</li>
          <li>50 ГБ Пам'яті</li>
          <li>Пріоритетна підтримка</li>
        </ul>
        <button class="cta-button accent">Обрати</button>
      </article>

      <!-- Картка 3: Преміум -->
      <article class="pricing-card">
        <h2 class="card-name">Преміум</h2>
        <p class="card-price">₴2500<span>/міс</span></p>
        <ul class="card-features">
          <li>Безліміт Користувачів</li>
          <li>1 ТБ Пам'яті</li>
          <li>24/7 Підтримка</li>
        </ul>
        <button class="cta-button">Обрати</button>
      </article>
    </div>
  </section>
</body>
</html>
