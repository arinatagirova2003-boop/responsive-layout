<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kanban-дошка</title>
  <link rel="stylesheet" href="kanban.css">
</head>
<body>
  <section class="board">
    <h1 class="board-title">Дошка завдань проєкту</h1>

    <div class="board-grid">
      <div class="column">
        <h2 class="column-title">Заплановано</h2>
        <div class="card">Розробити дизайн головної сторінки</div>
        <div class="card">Скласти контент-план на місяць</div>
        <div class="card">Налаштувати хостинг та домен</div>
      </div>

      <div class="column">
        <h2 class="column-title">В роботі</h2>
        <div class="card">Верстка Hero-секції</div>
        <div class="card">Інтеграція форми зворотного зв'язку</div>
      </div>

      <div class="column">
        <h2 class="column-title">Виконано</h2>
        <div class="card">Створено логотип</div>
        <div class="card">Прототип у Figma</div>
        <div class="card">Затверджено технічне завдання</div>
      </div>
    </div>
  </section>
</body>
</html>
